version: "3.9"

# ==================================================================
# CodeAI-X — Production Docker Compose
# Target: single Ubuntu VPS
# Owned by: DevOps (this file must not contain frontend/backend logic,
# only how those services are built, wired, and run)
# ==================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  codeaix_internal:
    name: codeaix_internal
    driver: bridge
  codeaix_edge:
    name: codeaix_edge
    driver: bridge

volumes:
  postgres_data:
    name: codeaix_postgres_data
  redis_data:
    name: codeaix_redis_data
  backend_logs:
    name: codeaix_backend_logs
  backend_uploads:
    name: codeaix_backend_uploads
  certbot_conf:
    name: codeaix_certbot_conf
  certbot_www:
    name: codeaix_certbot_www
  nginx_cache:
    name: codeaix_nginx_cache

services:
  # ------------------------------------------------------------
  # Reverse proxy / TLS termination / edge security
  # ------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: codeaix_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - codeaix_edge
      - codeaix_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ------------------------------------------------------------
  # Certbot — automatic SSL renewal (runs, renews, sleeps, repeats)
  # ------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: codeaix_certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;"
    networks:
      - codeaix_edge

  # ------------------------------------------------------------
  # Backend application (Node.js) — built from ../backend
  # DevOps does NOT own business logic inside this image, only
  # how it is containerized, run, and supervised.
  # ------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      args:
        NODE_ENV: production
    image: codeaix/backend:latest
    container_name: codeaix_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - codeaix_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ------------------------------------------------------------
  # PostgreSQL — primary datastore
  # ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: codeaix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - codeaix_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
    # No ports exposed to host — internal network only

  # ------------------------------------------------------------
  # Redis — cache, sessions, queues, rate-limit store
  # ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: codeaix_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - codeaix_internal
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 640M
    # No ports exposed to host — internal network only
